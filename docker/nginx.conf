user www-data;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    server {
        listen 80;
        server_name upup.ong.br www.upup.ong.br _;

        root /var/www/html;
        index index.html index.php;

        # Arquivos estáticos e HTML
        location / {
            try_files $uri $uri/ =404;
        }

        # PHP via PHP-FPM (socket interno do container)
        location ~ \.php$ {
            fastcgi_pass  127.0.0.1:9000;
            fastcgi_index index.php;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            include       fastcgi_params;
        }

        # Bloqueia acesso direto ao banco e configs sensíveis
        location ~* \.(db|sqlite|sqlite3|log)$ { deny all; return 404; }
        location = /admin/config.php { deny all; return 404; }
        location = /admin/auth.php   { deny all; return 404; }

        # Bloqueia listagem de diretórios
        autoindex off;
    }
}
